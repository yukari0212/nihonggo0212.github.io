<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플레이스씨 음료 주문 — 일본어교과교육연구회</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f5f4f0;min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:600px;margin:0 auto}
.header{text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e2e0d8}
.header h1{font-size:20px;font-weight:600;color:#1a1a18}
.header p{font-size:13px;color:#888780;margin-top:4px}
.section{background:#fff;border:1px solid #e2e0d8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.section-title{font-size:13px;font-weight:500;color:#5f5e5a;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.name-input{width:100%;padding:10px 12px;font-size:15px;border:1px solid #d3d1c7;border-radius:8px;background:#f5f4f0;color:#1a1a18;outline:none;font-family:inherit}
.name-input:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.15)}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:6px}
.menu-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid #e2e0d8;border-radius:8px;cursor:pointer;transition:background 0.15s,border-color 0.15s;user-select:none}
.menu-item:hover{background:#f5f4f0;border-color:#b4b2a9}
.menu-item.selected{background:#E6F1FB;border-color:#378ADD}
.menu-item.selected .menu-label{color:#0C447C;font-weight:500}
.menu-item input[type=radio]{accent-color:#378ADD;width:15px;height:15px;flex-shrink:0;cursor:pointer}
.menu-label{font-size:14px;color:#2c2c2a;line-height:1.3}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.tag-ice{background:#E6F1FB;color:#185FA5}
.tag-hot{background:#FAECE7;color:#993C1D}
.submit-btn{width:100%;padding:13px;font-size:16px;font-weight:600;background:#378ADD;color:white;border:none;border-radius:10px;cursor:pointer;transition:background 0.15s;font-family:inherit}
.submit-btn:hover{background:#185FA5}
.summary-section{background:#f5f4f0;border:1px solid #e2e0d8;border-radius:12px;padding:1rem 1.25rem;margin-top:1rem}
.summary-title{font-size:13px;font-weight:500;color:#5f5e5a;margin-bottom:10px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.summary-card{background:#fff;border:1px solid #e2e0d8;border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.summary-name{font-size:12px;color:#5f5e5a}
.summary-count{font-size:18px;font-weight:600;color:#185FA5}
.summary-count.zero{color:#b4b2a9;font-size:14px}
.total-bar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #e2e0d8}
.total-label{font-size:13px;color:#5f5e5a}
.total-num{font-size:20px;font-weight:600;color:#1a1a18}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#0F6E56;color:white;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.orders-table{width:100%;border-collapse:collapse;font-size:13px}
.orders-table th{text-align:left;padding:6px 8px;color:#5f5e5a;border-bottom:1px solid #e2e0d8;font-weight:500}
.orders-table td{padding:6px 8px;border-bottom:1px solid #e2e0d8;color:#2c2c2a}
.orders-table tr:last-child td{border-bottom:none}
.no-orders{font-size:13px;color:#b4b2a9;text-align:center;padding:1rem 0}
.reset-btn{font-size:12px;padding:4px 10px;border:1px solid #d3d1c7;border-radius:6px;background:transparent;color:#5f5e5a;cursor:pointer;font-family:inherit}
.reset-btn:hover{background:#e2e0d8}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>☕ 플레이스씨 음료 주문</h1>
    <p>일본어교과교육연구회 연수</p>
  </div>

  <div class="section">
    <div class="section-title">👤 주문자 정보</div>
    <input class="name-input" type="text" id="nameInput" placeholder="성명을 입력해 주세요" autocomplete="off" />
  </div>

  <div class="section">
    <div class="section-title">🥤 음료 선택 <span style="font-size:12px;color:#888780;font-weight:400">(1가지만 선택)</span></div>
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">주문 제출</button>

  <div class="summary-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="summary-title" style="margin-bottom:0">📊 메뉴별 총 주문 수</div>
      <button class="reset-btn" onclick="resetAll()">🔄 초기화</button>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="total-bar">
      <span class="total-label">총 주문 건수</span>
      <span class="total-num" id="totalCount">0건</span>
    </div>
  </div>

  <div class="summary-section" style="margin-top:1rem">
    <div class="summary-title">📋 주문자 목록</div>
    <div id="orderList"><div class="no-orders">아직 주문이 없습니다.</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MENUS=[
  {id:'ame-ice',label:'아메리카노',tag:'ICE',type:'ice'},
  {id:'ame-hot',label:'아메리카노',tag:'HOT',type:'hot'},
  {id:'latte-ice',label:'카페라떼',tag:'ICE',type:'ice'},
  {id:'latte-hot',label:'카페라떼',tag:'HOT',type:'hot'},
  {id:'vanilla-ice',label:'바닐라라떼',tag:'ICE',type:'ice'},
  {id:'vanilla-hot',label:'바닐라라떼',tag:'HOT',type:'hot'},
  {id:'cappuccino',label:'카푸치노',tag:'',type:''},
  {id:'caramel',label:'카라멜마끼아또',tag:'',type:''},
  {id:'mocha',label:'카페모카',tag:'',type:''},
  {id:'coldbrew',label:'콜드브루',tag:'',type:'ice'},
  {id:'coldbrew-latte',label:'콜드브루라떼',tag:'',type:'ice'},
  {id:'grapefruit',label:'자몽에이드',tag:'',type:'ice'},
  {id:'lemon',label:'레몬에이드',tag:'',type:'ice'},
  {id:'yuzu',label:'유자차',tag:'',type:''},
  {id:'earl-grey',label:'얼그레이',tag:'',type:''},
  {id:'peppermint',label:'페퍼민트',tag:'',type:''},
  {id:'chamomile',label:'캐모마일',tag:'',type:''},
  {id:'green-tea',label:'녹차',tag:'',type:''},
  {id:'hot-choco',label:'핫초코',tag:'',type:'hot'},
];

let orders=[];
let selectedMenu=null;

function fullLabel(m){return m.tag?m.label+' ('+m.tag+')':m.label}

function renderMenuGrid(){
  const g=document.getElementById('menuGrid');
  g.innerHTML=MENUS.map(m=>{
    const t=m.tag?`<span class="tag tag-${m.type}">${m.tag}</span>`:'';
    return`<label class="menu-item${selectedMenu===m.id?' selected':''}" id="item-${m.id}">
      <input type="radio" name="drink" value="${m.id}" onchange="selectMenu('${m.id}')" ${selectedMenu===m.id?'checked':''}><span class="menu-label">${m.label}</span>${t}</label>`;
  }).join('');
}

function selectMenu(id){
  selectedMenu=id;
  document.querySelectorAll('.menu-item').forEach(e=>e.classList.remove('selected'));
  const el=document.getElementById('item-'+id);
  if(el)el.classList.add('selected');
}

function renderSummary(){
  const c={};MENUS.forEach(m=>c[m.id]=0);
  orders.forEach(o=>{if(c[o.menuId]!==undefined)c[o.menuId]++});
  document.getElementById('summaryGrid').innerHTML=MENUS.map(m=>{
    const n=c[m.id];
    return`<div class="summary-card"><span class="summary-name">${fullLabel(m)}</span><span class="summary-count${n===0?' zero':''}">${n}</span></div>`;
  }).join('');
  document.getElementById('totalCount').textContent=orders.length+'건';
}

function renderOrderList(){
  const el=document.getElementById('orderList');
  if(!orders.length){el.innerHTML='<div class="no-orders">아직 주문이 없습니다.</div>';return}
  el.innerHTML=`<table class="orders-table"><thead><tr><th>#</th><th>성명</th><th>음료</th></tr></thead><tbody>${orders.map((o,i)=>`<tr><td style="color:#b4b2a9">${i+1}</td><td>${o.name}</td><td>${o.menuLabel}</td></tr>`).join('')}</tbody></table>`;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function submitOrder(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){showToast('성명을 입력해 주세요.');document.getElementById('nameInput').focus();return}
  if(!selectedMenu){showToast('음료를 선택해 주세요.');return}
  const m=MENUS.find(x=>x.id===selectedMenu);
  orders.push({name,menuId:selectedMenu,menuLabel:fullLabel(m)});
  showToast(name+'님 주문 완료! ✓');
  document.getElementById('nameInput').value='';
  selectedMenu=null;
  renderMenuGrid();renderSummary();renderOrderList();
}

function resetAll(){
  if(!orders.length){showToast('주문 내역이 없습니다.');return}
  if(!confirm('모든 주문 내역을 초기화할까요?'))return;
  orders=[];selectedMenu=null;
  document.getElementById('nameInput').value='';
  renderMenuGrid();renderSummary();renderOrderList();
  showToast('초기화 완료');
}

renderMenuGrid();renderSummary();renderOrderList();
</script>
</body>
</html>
